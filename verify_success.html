<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stripe | Verify Identity</title>
    <style>
        :root {
            --stripe-purple: #635bff;
            --stripe-dark: #1a1f36;
            --stripe-slate: #4f566b;
        }

        body { 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #f6f9fc; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* --- SIMULATION WATERMARK --- */
        body::after {
            content: "INTERNAL TRAINING SIMULATION ONLY";
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 4.5rem;
            color: rgba(0, 0, 0, 0.02);
            font-weight: 900;
            z-index: 5;
            pointer-events: none;
            white-space: nowrap;
        }

        .success-bg { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: linear-gradient(135deg, #f6f9fc 0%, #ffffff 50%, #f6f9fc 100%); 
            z-index: 1; 
        }

        /* Abstract shapes */
        .success-bg::before { 
            content: ""; 
            position: absolute; 
            top: -10%; right: -5%; 
            width: 50%; height: 80%; 
            background: linear-gradient(150deg, #ff9900 0%, #ff5c00 100%); 
            transform: skewY(-20deg); 
            opacity: 0.7; 
            z-index: 2;
        }

        .card { 
            background: white; 
            padding: 48px; 
            border-radius: 12px; 
            box-shadow: 0 50px 100px rgba(50,50,93,0.1), 0 15px 35px rgba(50,50,93,0.15); 
            max-width: 440px; 
            width: 90%; 
            z-index: 10; 
            text-align: left; 
            position: relative;
        }

        .stripe-logo {
            color: var(--stripe-purple); 
            font-weight: 800; 
            font-size: 24px; 
            margin-bottom: 28px; 
            letter-spacing: -1px;
        }

        h1 { font-size: 24px; color: var(--stripe-dark); margin-bottom: 16px; letter-spacing: -0.02em; }
        p { color: var(--stripe-slate); line-height: 1.6; font-size: 15px; }

        #seconds { font-weight: 700; color: var(--stripe-purple); }

        /* --- SAFETY HARBOR BANNER --- */
        .training-banner {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #1a1f36; color: #ffffff; padding: 12px;
            text-align: center; font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.05em;
            border-top: 2px solid #635bff; z-index: 9999;
        }
    </style>
</head>
<body>

    <div class="success-bg"></div>

    <div class="card">
        <div class="stripe-logo">stripe</div>
        <h1>We have verified your identity</h1>
        <p>
            Validation successful. You can now return to your developer settings to manage your keys. 
            <br><br>
            Closing this window in <span id="seconds">3</span>s...
        </p>
    </div>

    <div class="training-banner">
        ⚠️ TRAINING SIMULATION: DO NOT ENTER REAL FINANCIAL OR SENSITIVE DATA.
    </div>

    <script>
        let timeLeft = 3;
        const timer = setInterval(() => {
            timeLeft--;
            const secondsEl = document.getElementById('seconds');
            if(secondsEl) secondsEl.innerText = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(timer);
                // Redirect back to dashboard with the phone step flag
                window.location.href = "api_keys.html?step=phone";
            }
        }, 1000);
    </script>
</body>
</html>
